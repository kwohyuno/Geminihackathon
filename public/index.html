<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Coder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Voice Coder <span style="font-size:1.2em">&#9975;</span></h1>
    <p class="subtitle">Speak to edit code. Push to GitHub.</p>

    <!-- Repo selector -->
    <div class="section">
      <label for="repo-select">Repository</label>
      <select id="repo-select" disabled>
        <option>Loading repos...</option>
      </select>
    </div>

    <!-- Mic button -->
    <div class="mic-area">
      <button id="mic-btn" class="mic-btn" disabled>
        <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <div id="mic-status" class="mic-status">Select a repo to start</div>
    </div>

    <!-- Transcript -->
    <div id="transcript-area" class="section hidden">
      <label>Your command</label>
      <div id="transcript" class="transcript"></div>
    </div>

    <!-- Processing -->
    <div id="processing" class="section hidden">
      <div class="spinner"></div>
      <div id="processing-text">Processing...</div>
    </div>

    <!-- Results -->
    <div id="results" class="section hidden">
      <label>Results</label>
      <div id="results-content"></div>
    </div>

    <!-- Logs -->
    <div id="logs-area" class="section hidden">
      <label>Log</label>
      <div id="logs" class="logs"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
